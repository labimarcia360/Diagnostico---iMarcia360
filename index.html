<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Matemático | iMarcia360</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#FF2D8A;
  --pink-glow:rgba(255,45,138,.35);
  --violet:#7B2FFF;
  --violet-soft:#9B5FFF;
  --blue-neon:#2DF0FF;
  --bg:#000005;
  --card:#07050F;
  --card2:#0D0920;
  --border:#1C1530;
  --border-glow:#3A1F6A;
  --muted:#4A3F6B;
  --text:#E8E0FF;
  --text-dim:#8B7BAE;
  --green:#00E87A;
  --red:#FF3D6B;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Montserrat',sans-serif;
  font-weight:300;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:24px 16px 48px;
  position:relative;
  overflow-x:hidden;
}

/* Fundo com gradiente sutil */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(123,47,255,.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(255,45,138,.08) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

.wrap{
  width:100%;
  max-width:480px;
  background:var(--card);
  border:1px solid var(--border-glow);
  border-radius:20px;
  padding:36px 28px 28px;
  position:relative;
  z-index:1;
  box-shadow:
    0 0 60px rgba(123,47,255,.1),
    0 0 120px rgba(255,45,138,.05),
    inset 0 1px 0 rgba(123,47,255,.2);
}

/* Linha decorativa topo */
.wrap::before{
  content:'';
  position:absolute;
  top:0;left:20px;right:20px;height:2px;
  background:linear-gradient(90deg, transparent, var(--violet), var(--pink), transparent);
  border-radius:0 0 2px 2px;
}

/* TIPOGRAFIA */
h1{
  font-family:'Poppins',sans-serif;
  font-weight:800;
  font-size:1.5rem;
  line-height:1.2;
  margin-bottom:8px;
  letter-spacing:-.3px;
}
h2{
  font-family:'Poppins',sans-serif;
  font-weight:700;
  font-size:1.1rem;
  color:var(--violet-soft);
  margin-bottom:14px;
}
.accent{
  background:linear-gradient(90deg, var(--violet-soft), var(--pink));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.sub{
  color:var(--text-dim);
  font-size:.85rem;
  line-height:1.7;
  margin-bottom:24px;
}

/* INPUTS */
.input-group{position:relative;margin-bottom:12px;}
.input-group input{
  width:100%;
  padding:14px 16px;
  background:var(--card2);
  border:1px solid var(--border-glow);
  border-radius:12px;
  color:var(--text);
  font-family:'Montserrat',sans-serif;
  font-size:.88rem;
  font-weight:300;
  outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.input-group input:focus{
  border-color:var(--violet);
  box-shadow:0 0 0 3px rgba(123,47,255,.15);
}
select{
  width:100%;
  padding:14px 16px;
  margin-bottom:12px;
  background:var(--card2);
  border:1px solid var(--border-glow);
  border-radius:12px;
  color:var(--text);
  font-family:'Montserrat',sans-serif;
  font-size:.88rem;
  outline:none;
  transition:border-color .2s;
  appearance:none;
  cursor:pointer;
}
select:focus{border-color:var(--violet);}
select option{background:#0D0920;}
::placeholder{color:var(--muted);}

/* BOTÕES */
.btn{
  display:block;width:100%;
  padding:15px;margin-top:8px;
  border:none;border-radius:50px;
  font-family:'Poppins',sans-serif;
  font-weight:700;font-size:.9rem;
  cursor:pointer;
  transition:opacity .2s, transform .15s, box-shadow .2s;
  letter-spacing:.3px;
}
.btn-primary{
  background:linear-gradient(135deg, var(--violet), var(--pink));
  color:#fff;
  box-shadow:0 4px 20px rgba(123,47,255,.3);
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 30px rgba(123,47,255,.4);}
.btn-ig{
  background:linear-gradient(135deg, #833ab4, var(--pink));
  color:#fff;
  box-shadow:0 4px 20px var(--pink-glow);
}
.btn-ig:hover{opacity:.9;transform:translateY(-1px);}
.btn-ghost{
  background:transparent;
  border:1px solid var(--border-glow);
  color:var(--text-dim);
  margin-top:10px;
}
.btn-ghost:hover{border-color:var(--muted);color:var(--text-dim);}

/* BARRA DE PROGRESSO */
.prog{height:3px;background:var(--border);border-radius:2px;margin-bottom:26px;overflow:hidden;}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg, var(--violet), var(--pink));
  border-radius:2px;
  transition:width .5s ease;
  box-shadow:0 0 8px var(--pink-glow);
}

/* AUTOPERCEPÇÃO */
.step-label{
  font-size:.62rem;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:14px;
}
.auto-q{
  font-family:'Poppins',sans-serif;
  font-weight:700;
  font-size:1rem;
  color:var(--text);
  line-height:1.6;
  margin-bottom:20px;
}
.auto-opts{display:flex;flex-direction:column;gap:10px;}
.aopt{
  display:flex;align-items:center;gap:14px;
  padding:15px 18px;
  background:var(--card2);
  border:1px solid var(--border-glow);
  border-radius:14px;
  cursor:pointer;
  color:var(--text-dim);
  font-size:.87rem;
  transition:all .18s;
}
.aopt:hover{
  border-color:var(--violet);
  color:var(--text);
  background:#110D25;
  box-shadow:0 0 20px rgba(123,47,255,.15);
}
.aopt .em{font-size:1.35rem;min-width:30px;text-align:center;}

/* QUIZ */
.quiz-header{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:14px;
}
.q-meta{display:flex;align-items:center;gap:10px;}
.q-tag{
  background:rgba(123,47,255,.2);
  color:var(--violet-soft);
  font-size:.62rem;font-weight:700;
  padding:4px 12px;border-radius:20px;
  letter-spacing:1px;text-transform:uppercase;
  border:1px solid rgba(123,47,255,.3);
}
.q-count{font-size:.68rem;color:var(--muted);}
.timer{
  font-family:'Poppins',sans-serif;
  font-weight:700;font-size:.95rem;
  color:var(--blue-neon);
  letter-spacing:1.5px;
  text-shadow:0 0 10px rgba(45,240,255,.4);
}
.timer.urgent{
  color:var(--red);
  text-shadow:0 0 10px rgba(255,61,107,.5);
  animation:blink .7s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.q-text{
  font-family:'Poppins',sans-serif;
  font-weight:700;
  font-size:.98rem;
  color:var(--text);
  line-height:1.7;
  margin-bottom:20px;
}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{
  padding:13px 16px;
  background:var(--card2);
  border:1px solid var(--border-glow);
  border-radius:12px;
  cursor:pointer;
  color:var(--text-dim);
  font-family:'Montserrat',sans-serif;
  font-size:.87rem;font-weight:400;
  text-align:left;
  transition:all .15s;
  display:flex;align-items:center;gap:12px;
}
.opt:hover:not(.disabled){
  border-color:var(--violet);
  color:var(--text);
  background:#110D25;
}
.opt.correct{
  border-color:var(--green);
  color:var(--green);
  background:rgba(0,232,122,.06);
}
.opt.wrong{
  border-color:var(--red);
  color:var(--red);
  background:rgba(255,61,107,.06);
}
.opt.disabled{pointer-events:none;}
.opt-letter{
  font-family:'Poppins',sans-serif;
  font-weight:700;
  font-size:.65rem;
  color:var(--muted);
  min-width:18px;
  text-align:center;
  background:var(--border);
  padding:2px 5px;
  border-radius:4px;
}
.opt.correct .opt-letter{color:var(--green);background:rgba(0,232,122,.15);}
.opt.wrong .opt-letter{color:var(--red);background:rgba(255,61,107,.15);}

/* RESULTADO */
.profile-card{
  border-radius:16px;padding:24px 20px;
  margin-bottom:18px;text-align:center;
  position:relative;overflow:hidden;
}
.profile-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(123,47,255,.15), transparent);
  pointer-events:none;
}
.pc-icon{font-size:2.8rem;margin-bottom:12px;display:block;}
.pc-title{
  font-family:'Poppins',sans-serif;
  font-weight:800;font-size:1.15rem;
  margin-bottom:8px;
}
.pc-sub{font-size:.83rem;color:var(--text-dim);line-height:1.55;}

.pc-gold{border:1px solid rgba(255,200,0,.3);background:linear-gradient(150deg,#0D0A00,#1A1200);}
.pc-gold .pc-title{color:#FFD700;}
.pc-mag{border:1px solid rgba(255,45,138,.4);background:linear-gradient(150deg,#0D0020,#1A0030);}
.pc-mag .pc-title{background:linear-gradient(90deg,var(--violet-soft),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.pc-org{border:1px solid rgba(255,100,30,.3);background:linear-gradient(150deg,#0D0400,#1A0800);}
.pc-org .pc-title{color:#FF6420;}
.pc-blue{border:1px solid rgba(45,240,255,.3);background:linear-gradient(150deg,#000D1A,#001825);}
.pc-blue .pc-title{color:var(--blue-neon);}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat{
  background:var(--card2);
  border:1px solid var(--border-glow);
  border-radius:12px;
  padding:16px;text-align:center;
}
.stat-n{
  font-family:'Poppins',sans-serif;
  font-weight:800;font-size:1.8rem;
  background:linear-gradient(135deg,var(--violet-soft),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1;
}
.stat-l{font-size:.6rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:6px;}
.stat-note{font-size:.68rem;color:var(--muted);margin-top:4px;}

.section-lbl{
  font-size:.6rem;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:10px;
}
.topic-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.topic-row:last-child{border-bottom:none;}
.t-icon{font-size:.95rem;min-width:22px;text-align:center;}
.t-name{font-size:.83rem;color:var(--text-dim);flex:1;}
.tbadge{
  font-size:.62rem;font-weight:700;
  padding:3px 10px;border-radius:20px;letter-spacing:.5px;
}
.tbadge.ok{background:rgba(0,232,122,.1);color:var(--green);border:1px solid rgba(0,232,122,.25);}
.tbadge.no{background:rgba(255,45,138,.1);color:var(--pink);border:1px solid rgba(255,45,138,.25);}

.auto-band{
  display:flex;align-items:center;gap:14px;
  background:var(--card2);
  border:1px solid var(--border-glow);
  border-radius:12px;
  padding:14px 16px;margin-bottom:16px;
}
.ab-em{font-size:1.5rem;}
.ab-text{font-size:.8rem;color:var(--text-dim);line-height:1.5;}
.ab-text strong{
  font-family:'Poppins',sans-serif;
  font-weight:700;
  color:var(--text);
  display:block;margin-bottom:2px;
}

.msg{
  background:var(--card2);
  border-left:3px solid var(--violet);
  border-radius:0 12px 12px 0;
  padding:15px 17px;margin-bottom:18px;
  font-size:.85rem;color:var(--text-dim);line-height:1.75;
}

/* ADMIN */
.admin-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.admin-hd .btn{width:auto;padding:8px 16px;font-size:.78rem;margin:0;}
.tbl-wrap{overflow-x:auto;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:.68rem;}
th{color:var(--violet-soft);text-align:left;padding:7px 8px;border-bottom:1px solid var(--border-glow);font-weight:600;}
td{padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);}
.no-data{color:var(--muted);text-align:center;padding:28px;font-size:.85rem;}

.footer{
  text-align:center;margin-top:24px;
  font-size:.65rem;color:var(--border-glow);
  letter-spacing:2px;user-select:none;cursor:default;
  transition:color .3s;
  font-family:'Poppins',sans-serif;
  font-weight:700;
}
.footer:hover{color:var(--muted);}
.footer span{color:var(--violet-soft);}

.privacy{
  font-size:.67rem;color:var(--muted);
  text-align:center;margin-top:10px;line-height:1.5;
}
.hidden{display:none!important;}

/* Select arrow */
.select-wrap{position:relative;margin-bottom:12px;}
.select-wrap::after{
  content:'▾';
  position:absolute;right:14px;top:50%;
  transform:translateY(-50%);
  color:var(--muted);font-size:.75rem;
  pointer-events:none;
}
.select-wrap select{margin-bottom:0;}

/* Tag de série no cadastro */
.form-label{
  font-size:.62rem;color:var(--muted);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:6px;display:block;
}

/* Animação de entrada */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.wrap{animation:fadeUp .4s ease both;}
</style>
</head>
<body>
<div class="wrap" id="app">

<!-- S1: CADASTRO -->
<div id="s1">
  <h1>Olá, <span class="accent">Estudante!</span></h1>
  <p class="sub">Descubra teu perfil matemático em minutos — onde já mandas bem e onde dá pra turbinar.</p>
  <div class="input-group"><input type="text" id="nome" placeholder="Teu nome completo" autocomplete="off"></div>
  <div class="input-group"><input type="tel" id="tel" placeholder="WhatsApp com DDD  ex: 48 99999-9999"></div>
  <div class="input-group"><input type="email" id="email" placeholder="Seu melhor e-mail"></div>
  <div class="select-wrap">
    <select id="serie">
      <option value="">Qual é a tua série?</option>
      <option value="6">6º Ano</option>
      <option value="7">7º Ano</option>
      <option value="8">8º Ano</option>
      <option value="9">9º Ano</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="irAuto()">Começar diagnóstico →</button>
  <p class="privacy">🔒 Dados usados apenas para contato da Prof. Márcia.</p>
</div>

<!-- S2: AUTOPERCEPÇÃO -->
<div id="s2" class="hidden">
  <div class="prog"><div class="prog-fill" id="ap-fill"></div></div>
  <div class="step-label" id="ap-label">PERCEPÇÃO 1 DE 3</div>
  <div class="auto-q" id="ap-q"></div>
  <div class="auto-opts" id="ap-opts"></div>
</div>

<!-- S3: QUIZ -->
<div id="s3" class="hidden">
  <div class="quiz-header">
    <div class="q-meta">
      <span class="q-tag" id="q-tag">Tópico</span>
      <span class="q-count" id="q-count">1 / 5</span>
    </div>
    <div class="timer" id="timer">3:00</div>
  </div>
  <div class="prog"><div class="prog-fill" id="q-fill"></div></div>
  <div class="q-text" id="q-text"></div>
  <div class="opts" id="q-opts"></div>
</div>

<!-- S4: RESULTADO -->
<div id="s4" class="hidden">
  <div class="profile-card" id="pc">
    <span class="pc-icon" id="pc-icon">🎯</span>
    <div class="pc-title" id="pc-title">Perfil</div>
    <div class="pc-sub" id="pc-sub">—</div>
  </div>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-n" id="r-score">0/5</div>
      <div class="stat-l">Acertos</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="r-time">—</div>
      <div class="stat-l">Tempo</div>
      <div class="stat-note" id="r-time-note"></div>
    </div>
  </div>
  <div class="section-lbl">Desempenho por tópico</div>
  <div class="topic-list" id="topic-list" style="margin-bottom:16px"></div>
  <div class="auto-band">
    <div class="ab-em" id="ab-em">🧠</div>
    <div class="ab-text" id="ab-text"></div>
  </div>
  <div class="msg" id="r-msg"></div>
  <button class="btn btn-ig" onclick="cta()">📲 Falar com a Prof. Márcia</button>
  <button class="btn btn-ghost" onclick="reiniciar()">Refazer o diagnóstico</button>
</div>

<!-- ADMIN -->
<div id="s-admin" class="hidden">
  <div class="admin-hd">
    <h2 style="margin:0;font-size:.9rem">Leads coletados</h2>
    <button class="btn btn-primary" style="width:auto;padding:8px 16px;font-size:.78rem;margin:0" onclick="exportCSV()">↓ CSV</button>
  </div>
  <div id="adm-content"></div>
  <button class="btn btn-ghost" onclick="show('s1')">← Voltar</button>
</div>

<div class="footer" id="footer-logo" onclick="clickFooter()">
  <span>iMarcia360</span> · Pense Matemática
</div>
</div>

<script>
// ═══════════════════════════════════════════
// BANCO DE QUESTÕES EXPANDIDO — sem repetição via localStorage
// Fontes: BNCC, OBMEP níveis iniciais, livros didáticos aprovados PNLD
// ═══════════════════════════════════════════
const banco={
 "6":{

  "Porcentagem":[

   {q:"50% de 60 é:",ops:["12","25","30","40"],ok:2},
   {q:"20% de 150 é:",ops:["20","25","30","50"],ok:2},
   {q:"10% de 350 é:",ops:["3,5","30","35","350"],ok:2},
   {q:"5% de 100 é:",ops:["5","10","15","50"],ok:0},
   {q:"75% de 40 é:",ops:["20","25","30","35"],ok:2},
   {q:"30% de 90 é:",ops:["9","18","27","30"],ok:2},
   {q:"100% de 55 é:",ops:["5,5","11","50","55"],ok:3},
   {q:"40% de 200 é:",ops:["40","60","80","100"],ok:2}
  ],
  "Operações":[
   {q:"15 × 4 ÷ 6 = ?",ops:["8","10","12","9"],ok:1},
   {q:"8 × 7 − 20 = ?",ops:["16","36","46","56"],ok:1},
   {q:"72 ÷ 8 + 5 = ?",ops:["9","13","14","19"],ok:2},
   {q:"5 × 9 − 15 = ?",ops:["15","20","30","45"],ok:2},
   {q:"100 ÷ 4 + 12 = ?",ops:["28","30","37","40"],ok:2},
   {q:"(3 + 7) × 5 = ?",ops:["25","40","50","35"],ok:2},
   {q:"120 ÷ (4 × 3) = ?",ops:["5","8","10","15"],ok:2},
   {q:"6² − 4 × 3 = ?",ops:["12","18","24","36"],ok:0},
   {q:"2 × (8 + 3) − 5 = ?",ops:["12","15","17","22"],ok:2},
   {q:"144 ÷ 12 + 8 = ?",ops:["12","18","20","22"],ok:3}
  ],
  "Geometria":[
   {q:"Quantos lados tem um hexágono?",ops:["4","5","6","7"],ok:2},
   {q:"Quantos vértices tem um cubo?",ops:["4","6","8","12"],ok:2},
   {q:"Quantas faces tem um cubo?",ops:["4","5","6","8"],ok:2},
   {q:"Quantos lados tem um pentágono?",ops:["4","5","6","7"],ok:1},
   {q:"Soma dos ângulos internos de um triângulo:",ops:["90°","180°","270°","360°"],ok:1},

// ═══════════════════════════════════════════
function getUsadas(serie){
  try{
    const raw=localStorage.getItem(`im360_usadas_${serie}`);
    return raw?JSON.parse(raw):{};
  }catch(e){return {};}
}
function salvarUsada(serie,topico,idx){
  const usadas=getUsadas(serie);
  if(!usadas[topico])usadas[topico]=[];
  if(!usadas[topico].includes(idx))usadas[topico].push(idx);
  // Reset se todas já foram usadas
  const total=banco[serie][topico].length;
  if(usadas[topico].length>=total)usadas[topico]=[];
  localStorage.setItem(`im360_usadas_${serie}`,JSON.stringify(usadas));
}
function sortearSemRepeticao(serie){
  const usadas=getUsadas(serie);
  return Object.entries(banco[serie]).map(([topico,pool])=>{
    const ja=usadas[topico]||[];
    const disponiveis=pool.map((_,i)=>i).filter(i=>!ja.includes(i));
    const idx=disponiveis[Math.floor(Math.random()*disponiveis.length)];
    salvarUsada(serie,topico,idx);
    const b=pool[idx];
    // Embaralha opções mantendo rastreio da correta
    const items=b.ops.map((op,i)=>({op,c:i===b.ok}));
    for(let i=items.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [items[i],items[j]]=[items[j],items[i]];
    }
    return{topico,q:b.q,ops:items.map(x=>x.op),ok:items.findIndex(x=>x.c)};
  });
}

// ═══════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════
let S={nome:"",tel:"",email:"",serie:"",autoIdx:0,autoScore:0,qi:0,qs:[],resps:[]};
let timerInt=null,timerSec=180,totalElapsed=0,lastTick=null;
const LETRAS=["A","B","C","D"];

// ═══════════════════════════════════════════
// NAVEGAÇÃO
// ═══════════════════════════════════════════
const VIEWS=["s1","s2","s3","s4","s-admin"];
function show(id){VIEWS.forEach(v=>document.getElementById(v).classList.add("hidden"));document.getElementById(id).classList.remove("hidden");}

// ═══════════════════════════════════════════
// S1 — CADASTRO
// ═══════════════════════════════════════════
function irAuto(){
 const nome=document.getElementById('nome').value.trim();
 const tel=document.getElementById('tel').value.trim();
 const email=document.getElementById('email').value.trim();
 const serie=document.getElementById('serie').value;
 if(!nome)return err("Coloca teu nome pra começar!");
 if(!tel)return err("Preciso do teu WhatsApp!");
 if(!email)return err("Coloca teu e-mail!");
 if(!serie)return err("Seleciona tua série!");
 S={...S,nome,tel,email,serie,autoIdx:0,autoScore:0,qi:0,resps:[]};
 show("s2");renderAuto();
}

// ═══════════════════════════════════════════
// S2 — AUTOPERCEPÇÃO
// ═══════════════════════════════════════════
function renderAuto(){
 const i=S.autoIdx,q=autoQs[i];
 document.getElementById('ap-fill').style.width=`${Math.round(((i+1)/3)*100)}%`;
 document.getElementById('ap-label').textContent=`PERCEPÇÃO ${i+1} DE 3`;
 document.getElementById('ap-q').textContent=q.q;
 const c=document.getElementById('ap-opts');c.innerHTML='';
 q.opts.forEach(o=>{
  const d=document.createElement('div');d.className='aopt';
  d.innerHTML=`<span class="em">${o.e}</span><span>${o.t}</span>`;
  d.onclick=()=>{S.autoScore+=o.v;S.autoIdx++;S.autoIdx<3?renderAuto():iniciarQuiz();};
  c.appendChild(d);
 });
}

// ═══════════════════════════════════════════
// S3 — QUIZ
// ═══════════════════════════════════════════
function iniciarQuiz(){
 S.qi=0;
 S.qs=sortearSemRepeticao(S.serie);
 S.resps=[];
 timerSec=180;totalElapsed=0;lastTick=Date.now();
 show("s3");renderQ();
 timerInt=setInterval(tick,1000);
}
function renderQ(){
 const q=S.qs[S.qi],n=S.qi+1,tot=S.qs.length;
 document.getElementById('q-fill').style.width=`${(n/tot)*100}%`;
 document.getElementById('q-tag').textContent=q.topico;
 document.getElementById('q-count').textContent=`${n} / ${tot}`;
 document.getElementById('q-text').textContent=q.q;
 const c=document.getElementById('q-opts');c.innerHTML='';
 q.ops.forEach((op,i)=>{
  const d=document.createElement('div');d.className='opt';
  d.innerHTML=`<span class="opt-letter">${LETRAS[i]}</span><span>${op}</span>`;
  d.onclick=()=>responder(i);
  c.appendChild(d);
 });
}
function responder(idx){
 if(lastTick){totalElapsed+=Math.round((Date.now()-lastTick)/1000);lastTick=Date.now();}
 const q=S.qs[S.qi];
 document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
 document.querySelectorAll('.opt')[q.ok].classList.add('correct');
 if(idx!==q.ok)document.querySelectorAll('.opt')[idx].classList.add('wrong');
 S.resps.push({acertou:idx===q.ok,topico:q.topico});
 setTimeout(()=>{S.qi++;S.qi<S.qs.length?renderQ():finalizar();},950);
}
function finalizar(){
 if(timerInt){clearInterval(timerInt);timerInt=null;}
 if(lastTick){totalElapsed+=Math.round((Date.now()-lastTick)/1000);lastTick=null;}
 mostrarResultado();
}
function tick(){
 if(lastTick){totalElapsed+=Math.round((Date.now()-lastTick)/1000);lastTick=Date.now();}
 timerSec--;
 const m=Math.floor(timerSec/60),s=timerSec%60;
 const el=document.getElementById('timer');
 el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
 el.className='timer'+(timerSec<=30?' urgent':'');
 if(timerSec<=0){
  clearInterval(timerInt);timerInt=null;
  while(S.resps.length<S.qs.length)S.resps.push({acertou:false,topico:S.qs[S.resps.length].topico});
  totalElapsed=180;mostrarResultado();
 }
}
function fmtTime(s){
 if(s>=180)return"3:00 ⏰";
 return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}
function timeNote(s){
 if(s<=90)return"Ótimo ritmo! 🚀";
 if(s<=150)return"Bom ritmo.";
 if(s<180)return"Usou o tempo todo.";
 return"Tempo esgotado.";
}

// ═══════════════════════════════════════════
// S4 — RESULTADO
// ═══════════════════════════════════════════
function mostrarResultado(){
 const ok=S.resps.filter(r=>r.acertou).length;
 const hs=S.autoScore>=6;const hp=ok>=3;
 const pkey=hp&&hs?"autonomo":hp&&!hs?"classico":!hp&&!hs?"construindo":"realinhamento";
 const p=perfis[pkey];
 const pc=document.getElementById('pc');
 pc.className='profile-card '+p.css;
 document.getElementById('pc-icon').textContent=p.icon;
 document.getElementById('pc-title').textContent=p.title;
 document.getElementById('pc-sub').textContent=p.sub;
 document.getElementById('r-score').textContent=`${ok}/5`;
 document.getElementById('r-time').textContent=fmtTime(totalElapsed);
 document.getElementById('r-time-note').textContent=timeNote(totalElapsed);
 const tl=document.getElementById('topic-list');tl.innerHTML='';
 S.resps.forEach(r=>{
  const d=document.createElement('div');d.className='topic-row';
  d.innerHTML=`<span class="t-icon">${r.acertou?'✅':'❌'}</span>
   <span class="t-name">${r.topico}</span>
   <span class="tbadge ${r.acertou?'ok':'no'}">${r.acertou?'Domina':'Rever'}</span>`;
  tl.appendChild(d);
 });
 document.getElementById('ab-em').textContent=p.autoEm;
 document.getElementById('ab-text').innerHTML=p.autoText;
 document.getElementById('r-msg').textContent=p.msg;
 salvarLead(ok,p.title);show("s4");
}

// ═══════════════════════════════════════════
// LEADS
// ═══════════════════════════════════════════
function salvarLead(score,perfil){
 const leads=JSON.parse(localStorage.getItem('im360')||'[]');
 leads.push({
  id:Date.now(),
  data:new Date().toLocaleString('pt-BR'),
  nome:S.nome,whatsapp:S.tel,email:S.email,serie:S.serie+'º Ano',
  acertos:`${score}/5`,tempo:fmtTime(totalElapsed),perfil,
  fortes:S.resps.filter(r=>r.acertou).map(r=>r.topico).join(', ')||'—',
  rever:S.resps.filter(r=>!r.acertou).map(r=>r.topico).join(', ')||'—'
 });
 localStorage.setItem('im360',JSON.stringify(leads));
}

function reiniciar(){

 document.getElementById('nome').value='';
 document.getElementById('tel').value='';

}

// ADMIN — 5 cliques no rodapé
// ═══════════════════════════════════════════
let _cc=0,_ct=null;
function clickFooter(){
 _cc++;if(_ct)clearTimeout(_ct);
 _ct=setTimeout(()=>_cc=0,2500);
 if(_cc>=5){_cc=0;abrirAdmin();}
}
function abrirAdmin(){
 const leads=JSON.parse(localStorage.getItem('im360')||'[]');
 const el=document.getElementById('adm-content');
 if(!leads.length){el.innerHTML='<p class="no-data">Nenhum lead ainda.</p>';}
 else{
  el.innerHTML=`<p style="font-size:.72rem;color:var(--muted);margin-bottom:10px">${leads.length} lead(s)</p>
  <div class="tbl-wrap"><table>
  <tr><th>Data</th><th>Nome</th><th>WhatsApp</th><th>E-mail</th><th>Série</th><th>Acertos</th><th>Perfil</th><th>Rever</th></tr>
  ${leads.map(l=>`<tr><td>${l.data}</td><td>${l.nome}</td><td>${l.whatsapp}</td>
   <td>${l.email||'—'}</td><td>${l.serie}</td><td>${l.acertos}</td><td>${l.perfil}</td><td>${l.rever}</td></tr>`).join('')}
  </table></div>`;
 }
 show("s-admin");
}
function exportCSV(){
 const leads=JSON.parse(localStorage.getItem('im360')||'[]');
 if(!leads.length)return err("Nenhum lead para exportar.");
 const h=["Data","Nome","WhatsApp","E-mail","Série","Acertos","Tempo","Perfil","Fortes","Rever"];
 const rows=leads.map(l=>[l.data,l.nome,l.whatsapp,l.email||'',l.serie,l.acertos,l.tempo,l.perfil,l.fortes,l.rever]);
 const csv=[h,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
 a.download=`leads_imarcia360_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
 a.click();
}

function err(msg){
 let e=document.getElementById('_err');
 if(!e){e=document.createElement('p');e.id='_err';
  e.style.cssText='color:var(--pink);font-size:.78rem;text-align:center;margin-top:8px';
  document.getElementById('s1').appendChild(e);}
 e.textContent=msg;setTimeout(()=>e.textContent='',2500);
}
</script>
